mapping:
  occupancy_grid:
    width_m: 20.0
    height_m: 20.0
    resolution: 0.1
    origin_x: -10.0
    origin_y: -10.0
  slam:
    backend: orbslam3
    command:
      - ./ORB_SLAM3
      - Mono
      - /app/slam/ORBvoc.txt
      - /app/slam/monocular.yaml
      - /dev/video0
    pose_file: /app/slam/pose.txt
    map_points_file: /app/slam/map_points.txt
    use_map_points: true

planning:
  allow_diagonal: true
  smooth_path: true

navigation:
  goal_source: file
  goal_file: config/goal.json
  fallback_goal_relative: [5.0, 0.0]
  goal_distance_m: 5.0